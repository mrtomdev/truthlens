<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="dot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="1080" cy="120" r="320" fill="url(#dot)"/>
  <circle cx="180" cy="540" r="240" fill="url(#dot)"/>

  <!-- Magnifier icon -->
  <g transform="translate(96,180)">
    <circle cx="80" cy="80" r="68" fill="none" stroke="#fff" stroke-width="10"/>
    <circle cx="80" cy="80" r="22" fill="#fff"/>
    <path d="M132 132 L196 196" stroke="#fff" stroke-width="14" stroke-linecap="round"/>
  </g>

  <text x="290" y="240" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="92" font-weight="800" fill="#fff" letter-spacing="-2">TruthLens</text>
  <text x="290" y="300" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="34" font-weight="600" fill="#e0f2fe">AI Toxicity &amp; Synthetic Media Detector</text>

  <text x="96" y="430" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="30" fill="#fff" opacity="0.95">Detect ChatGPT • Deepfakes • Cloned Voices — in real time</text>
  <text x="96" y="478" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="26" fill="#e0f2fe">100% on-device · zero telemetry · free &amp; open source</text>

  <!-- Browser badges -->
  <g font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#0369a1">
    <rect x="96" y="528" width="170" height="56" rx="12" fill="#fff"/>
    <text x="181" y="564" text-anchor="middle">Chrome</text>
    <rect x="282" y="528" width="120" height="56" rx="12" fill="#fff"/>
    <text x="342" y="564" text-anchor="middle">Edge</text>
    <rect x="418" y="528" width="120" height="56" rx="12" fill="#fff"/>
    <text x="478" y="564" text-anchor="middle">Brave</text>
    <rect x="554" y="528" width="130" height="56" rx="12" fill="#fff"/>
    <text x="619" y="564" text-anchor="middle">Opera</text>
    <rect x="700" y="528" width="190" height="56" rx="12" fill="#fff"/>
    <text x="795" y="564" text-anchor="middle">Manifest V3</text>
  </g>

  <text x="1184" y="600" font-family="system-ui, sans-serif" font-size="22" fill="#fff" opacity="0.85" text-anchor="end">github.com/mrtomdev/truthlens</text>
</svg>
